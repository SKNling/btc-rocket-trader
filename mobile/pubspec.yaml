name: btc_rocket_trader
description: BTC Rocket Trader — Flutter Android app for receiving rocket signals and executing trades.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.0.0
  http: ^1.3.0
  shared_preferences: ^2.5.3
  provider: ^6.1.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
